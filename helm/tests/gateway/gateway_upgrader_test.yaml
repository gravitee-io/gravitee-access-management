suite: Test Gateway Upgrader Job
templates:
  - "gateway/gateway-upgrader-job.yaml"
  - "gateway/gateway-configmap.yaml"
tests:
  - it: Check upgrade mode is enabled
    set:
      gateway:
        upgrader: true
    template: gateway/gateway-upgrader-job.yaml
    chart:
      version: 1.0.0-chart
      appVersion: 1.0.0-app
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - equal:
          path: spec.template.spec.containers[0].image
          value: graviteeio/am-gateway:1.0.0-app
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: upgrade.mode
              value: "true"
      - isEmpty:
          # It should not contain init containers by default
          path: spec.template.spec.initContainers

  - it: JDBC enables per-scope liquibase for the gateway-owned scopes
    set:
      management:
        type: jdbc
      gateway:
        upgrader: true
    template: gateway/gateway-upgrader-job.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_REPOSITORIES_OAUTH2_JDBC_LIQUIBASE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_REPOSITORIES_GATEWAY_JDBC_LIQUIBASE_ENABLED
            value: "true"

  - it: Mongo does not set per-scope liquibase flags
    set:
      management:
        type: mongodb
      gateway:
        upgrader: true
    template: gateway/gateway-upgrader-job.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_REPOSITORIES_OAUTH2_JDBC_LIQUIBASE_ENABLED
            value: "true"

  - it: Check if the helm hook annotations are present
    set:
      gateway:
        upgrader: true
    template: gateway/gateway-upgrader-job.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - equal:
          path: metadata.annotations
          value:
            helm.sh/hook: pre-upgrade
            helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: Check if the upgrader manifest is missing by default
    template: gateway/gateway-upgrader-job.yaml
    asserts:
      - hasDocuments:
          count: 0
