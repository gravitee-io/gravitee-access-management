          example: https://issuer.example.com
        jwksUri:
          type: string
          description: JWKS endpoint URL. Required when keyResolutionMethod is JWKS_URL.
          example: https://issuer.example.com/.well-known/jwks.json
        keyResolutionMethod:
          type: string
          description: How the issuer's signing key is resolved. JWKS_URL fetches
            keys from a JWKS endpoint; PEM uses an inline X.509 certificate.
          enum:
          - JWKS_URL
          - PEM
        scopeMappings:
          type: object
          additionalProperties:
            type: string
            description: One-to-one mapping from external scope to domain scope. Unmapped
              issuer scopes are dropped (fail-closed).
