        \ covering impersonation and delegation."
      properties:
        allowDelegation:
          type: boolean
          default: false
          description: "Whether delegation is allowed, where an actor acts on behalf\
            \ of the subject and an \"act\" claim is added to the issued token. At\
            \ least one of allowImpersonation or allowDelegation must be enabled."
        allowImpersonation:
          type: boolean
          default: true
          description: "Whether impersonation is allowed, where the issued token represents\
            \ the subject directly. At least one of allowImpersonation or allowDelegation\
            \ must be enabled."
        allowedActorTokenTypes:
          type: array
          description: Token types accepted as the actor token when delegating.
          example:
          - urn:ietf:params:oauth:token-type:access_token
          - urn:ietf:params:oauth:token-type:id_token
          items:
            type: string
            description: Token types accepted as the actor token when delegating.
            example: "[\"urn:ietf:params:oauth:token-type:access_token\",\"urn:ietf:params:oauth:token-type:id_token\"\
              ]"
        allowedRequestedTokenTypes:
          type: array
          description: Token types that may be requested as the result of an exchange.
          example:
          - urn:ietf:params:oauth:token-type:access_token
          - urn:ietf:params:oauth:token-type:id_token
          items:
            type: string
            description: Token types that may be requested as the result of an exchange.
            example: "[\"urn:ietf:params:oauth:token-type:access_token\",\"urn:ietf:params:oauth:token-type:id_token\"\
              ]"
        allowedSubjectTokenTypes:
          type: array
          description: Token types accepted as the subject token in an exchange.
          example:
          - urn:ietf:params:oauth:token-type:access_token
          - urn:ietf:params:oauth:token-type:id_token
          items:
            type: string
            description: Token types accepted as the subject token in an exchange.
            example: "[\"urn:ietf:params:oauth:token-type:access_token\",\"urn:ietf:params:oauth:token-type:id_token\"\
              ]"
        enabled:
          type: boolean
          default: false
          description: Whether token exchange is enabled for the domain.
        maxDelegationDepth:
          type: integer
          format: int32
          default: 25
          description: Maximum depth of the delegation chain (nested "act" claims).
