components:
  schemas:
    AccessPolicy:
      type: object
      properties:
        condition:
          type: string
        createdAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
        description:
          type: string
        domain:
          type: string
        enabled:
          type: boolean
        id:
          type: string
        name:
          type: string
        order:
          type: integer
          format: int32
        resource:
          type: string
        type:
          type: string
          enum:
          - GROOVY
        updatedAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
    AccessPolicyListItem:
      type: object
      properties:
        createdAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
        description:
          type: string
        id:
          type: string
        name:
          type: string
        updatedAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
    AccountAccessToken:
      type: object
      properties:
        createdAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
        issuerId:
          type: string
        issuerUsername:
          type: string
        name:
          type: string
        referenceId:
          type: string
        referenceType:
          type: string
          enum:
          - PLATFORM
          - DOMAIN
          - APPLICATION
          - ORGANIZATION
          - ENVIRONMENT
          - PROTECTED_RESOURCE
        token:
          type: string
        tokenId:
          type: string
        updatedAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
        userId:
          type: string
    AccountSettings:
      type: object
      properties:
        accountBlockedDuration:
          type: integer
          format: int32
        autoLoginAfterRegistration:
          type: boolean
        autoLoginAfterResetPassword:
          type: boolean
        botDetectionPlugin:
          type: string
        completeRegistrationWhenResetPassword:
          type: boolean
        defaultIdentityProviderForRegistration:
          type: string
        deletePasswordlessDevicesAfterResetPassword:
          type: boolean
        dynamicUserRegistration:
          type: boolean
        inherited:
          type: boolean
        loginAttemptsDetectionEnabled:
          type: boolean
        loginAttemptsResetTime:
          type: integer
          format: int32
        maxLoginAttempts:
          type: integer
          format: int32
        mfaChallengeAttemptsDetectionEnabled:
          type: boolean
        mfaChallengeAttemptsResetTime:
          type: integer
          format: int32
        mfaChallengeMaxAttempts:
          type: integer
          format: int32
        mfaChallengeSendVerifyAlertEmail:
          type: boolean
        redirectUriAfterRegistration:
          type: string
        redirectUriAfterResetPassword:
          type: string
        rememberMe:
          type: boolean
        rememberMeDuration:
          type: integer
          format: int32
        resetPasswordConfirmIdentity:
          type: boolean
        resetPasswordCustomForm:
          type: boolean
        resetPasswordCustomFormFields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"
        resetPasswordInvalidateTokens:
          type: boolean
        sendRecoverAccountEmail:
          type: boolean
        sendVerifyRegistrationAccountEmail:
          type: boolean
        useBotDetection:
          type: boolean
    Address:
      type: object
      properties:
        country:
          type: string
        formatted:
          type: string
        locality:
          type: string
        postalCode:
          type: string
        primary:
          type: boolean
        region:
          type: string
        streetAddress:
          type: string
        type:
          type: string
    AlertNotifier:
      type: object
      properties:
        configuration:
          type: string
        createdAt:
          type: integer
          format: int64
          description: Epoch timestamp in milliseconds.
        enabled:
          type: boolean
        id:
