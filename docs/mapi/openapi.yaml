    WebAuthnSettings:
      type: object
      description: WebAuthn (FIDO2) relying-party configuration governing passwordless
        and multi-factor authentication for the domain.
      properties:
        attestationConveyancePreference:
          type: string
          default: NONE
          description: "Relying-party preference for attestation conveyance during\
            \ credential creation. NONE requests no attestation, INDIRECT allows anonymized\
            \ attestation, and DIRECT requests the authenticator's attestation statement."
          enum:
          - NONE
          - INDIRECT
          - DIRECT
        authenticatorAttachment:
          type: string
          description: Preferred authenticator attachment. PLATFORM selects authenticators
            bound to the device (such as a fingerprint reader); CROSS_PLATFORM selects
            roaming authenticators (such as a security key).
          enum:
          - CROSS_PLATFORM
          - PLATFORM
        certificates:
          type: object
          additionalProperties:
            type: object
            description: "Trusted device-attestation X.509 certificates, keyed by\
              \ name."
          description: "Trusted device-attestation X.509 certificates, keyed by name."
        enforceAuthenticatorIntegrity:
          type: boolean
          default: false
          description: Whether to periodically re-verify that registered authenticators
            remain valid against the FIDO2 Metadata Service.
        enforceAuthenticatorIntegrityMaxAge:
          type: integer
          format: int32
          description: "Maximum elapsed time, in seconds, since an authenticator was\
            \ last verified before it is re-checked on the next passwordless login."
        forceRegistration:
          type: boolean
          default: false
          description: Whether to reject registration of a credential already registered
            to a different user.
        origin:
          type: string
          description: Relying-party origin; must match the browser's window.location.origin
            during registration and authentication ceremonies.
          example: https://auth.example.com
        relyingPartyId:
          type: string
          description: "Relying-party identifier: a domain string that scopes credentials\
            \ to this entity. A credential can only be used with the relying party\
            \ it was registered against."
          example: auth.example.com
        relyingPartyName:
          type: string
          description: Human-readable relying-party name shown to users during ceremonies.
          example: Example Inc.
        requireResidentKey:
          type: boolean
          default: false
          description: Whether the authenticator must create a client-side resident
            (discoverable) credential.
        userVerification:
          type: string
          default: PREFERRED
          description: "Relying-party requirement regarding user verification during\
            \ a ceremony. REQUIRED enforces verification, PREFERRED requests it when\
            \ available, and DISCOURAGED avoids it."
          enum:
          - REQUIRED
          - PREFERRED
          - DISCOURAGED
      title: WebAuthn settings
  securitySchemes:
    gravitee-auth:
      scheme: Bearer
      type: http
