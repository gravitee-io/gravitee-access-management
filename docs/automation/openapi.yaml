openapi: 3.0.1
info:
  contact:
    email: team-gko@graviteesource.com
    name: DevX team
    url: https://www.gravitee.io/
  description: |-
    Declarative, idempotent management of Gravitee Access Management resources.

    Each resource is identified by a stable, immutable `key` that you choose. Applying a resource with `PUT` creates it on first use and updates it on subsequent applies, so the same request can be replayed safely to converge on a desired state.

    The API only sees and manages resources it owns (those marked as managed by the Automation API). Resources created through the Management API or console are invisible to these endpoints and cannot be read, updated, or deleted here; conversely, resources created here are fully owned by the Automation API.

    Domains are the top-level resource; certificates, identity providers, and reporters are managed as sub-resources of a domain. Deleting a domain cascades to its Automation-managed sub-resources. Some sub-resources support a `system` flag identifying the domain's built-in default; the flag is immutable once set.

    This API complements the Management API, which remains the interactive, full-featured management surface.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Gravitee.io AM - Automation API
  version: 4.12.0
servers:
- url: http://localhost:8093/automation
security:
- BearerAuth: []
tags:
- description: Certificates configured under a domain to sign and verify tokens.
  name: Certificates
- description: "Security domains: the top-level container for an authentication and\
    \ authorization configuration. Create, read, update, and delete domains, and reach\
    \ their sub-resources."
  name: Domains
- description: Identity providers configured under a domain to authenticate users.
  name: Identity Providers
- description: Reporters configured under a domain to persist audit events to a backend.
  name: Reporters
paths:
  /organizations/{orgId}/environments/{envId}/domains:
    get:
      description: Returns all security domains within the specified environment.
      operationId: automationListDomains
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                AutomationDomainList:
                  value:
                  - key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationDomain"
          description: List of domains
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        default:
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 500
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Unexpected error
      summary: List all domains
      tags:
      - Domains
    put:
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the domain. On first apply the domain is created; subsequent applies
        update it. dataPlaneId is required at creation and immutable afterwards.
      operationId: automationCreateOrUpdateDomain
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            examples:
              Domain:
                description: A domain with common settings
                value:
                  key: example-domain
                  name: Example domain
                  description: An example authentication domain
                  enabled: true
                  path: /example-domain
                  dataPlaneId: default
                  tags:
                  - eu
                  - production
                  accountSettings:
                    inherited: false
                    loginAttemptsDetectionEnabled: true
                    maxLoginAttempts: 10
                    accountBlockedDuration: 7200
                  oidc:
                    redirectUriStrictMatching: true
            schema:
              $ref: "#/components/schemas/AutomationDomain"
        description: Desired state of the domain.
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Domain:
                  description: A domain with common settings
                  value:
                    key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
              schema:
                $ref: "#/components/schemas/AutomationDomain"
          description: The created or updated domain
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 400
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Invalid request: validation failure, an immutable field change,\
            \ a key that already exists for a domain not managed by the Automation\
            \ API, or an unknown defaultIdentityProviderForRegistration reference"
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
      summary: Create or update a domain
      tags:
      - Domains
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}:
    delete:
      description: "Deletes an Automation-managed domain. Deletion cascades to the\
        \ domain's sub-resources (certificates, identity providers, and reporters).\
        \ Deleting a domain that does not exist also returns 204."
      operationId: automationDeleteDomain
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Domain successfully deleted
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        default:
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 500
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Unexpected error
      summary: Delete a domain
      tags:
      - Domains
    get:
      description: Retrieves a single Automation-managed security domain by its key.
      operationId: automationGetDomain
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                Domain:
                  description: A domain with common settings
                  value:
                    key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
              schema:
                $ref: "#/components/schemas/AutomationDomain"
          description: The domain
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain not found, or not managed by the Automation API"
      summary: Get a domain
      tags:
      - Domains
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates:
    get:
      description: Returns all certificates managed by the Automation API under the
        domain. Certificates created outside the Automation API are not returned.
      operationId: automationListCertificates
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                AutomationCertificateList:
                  value:
                  - key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                  - key: default
                    system: true
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationCertificate"
          description: List of certificates
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain not found, or not managed by the Automation API"
      summary: List a domain's certificates
      tags:
      - Certificates
      - Domains
    put:
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the certificate within the domain. Re-applying an unchanged definition
        is a no-op. The system flag is immutable; changing it requires deleting and
        recreating the certificate.
      operationId: automationCreateOrUpdateCertificate
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            examples:
              Certificate:
                description: A fully specified certificate
                value:
                  key: signing-cert
                  name: Signing certificate
                  type: javakeystore-am-certificate
                  configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                    },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                    secret\"}"
              System certificate:
                description: The domain's system certificate; only system and key
                  are needed
                value:
                  key: default
                  system: true
            schema:
              $ref: "#/components/schemas/AutomationCertificate"
        description: "Desired state of the certificate. For a system certificate,\
          \ supply only system: true and key."
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Certificate:
                  description: A fully specified certificate
                  value:
                    key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                System certificate:
                  description: The domain's system certificate; only system and key
                    are needed
                  value:
                    key: default
                    system: true
              schema:
                $ref: "#/components/schemas/AutomationCertificate"
          description: The created or updated certificate
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 400
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Invalid request: a key conflict, a missing required field\
            \ for a non-system certificate, an attempt to change the immutable system\
            \ flag, or a second system certificate for the domain"
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain not found, or not managed by the Automation API"
      summary: Create or update a certificate
      tags:
      - Certificates
      - Domains
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}:
    delete:
      description: Deletes an Automation-managed certificate by its key. Deleting
        a certificate that does not exist also returns 204.
      operationId: automationDeleteCertificate
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      - description: Key of the certificate within the domain.
        example: signing-cert
        in: path
        name: certKey
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Certificate successfully deleted
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        default:
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 500
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Unexpected error
      summary: Delete a certificate
      tags:
      - Certificates
      - Domains
    get:
      description: Retrieves a single Automation-managed certificate by its key.
      operationId: automationGetCertificate
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      - description: Key of the certificate within the domain.
        example: signing-cert
        in: path
        name: certKey
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                Certificate:
                  description: A fully specified certificate
                  value:
                    key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                System certificate:
                  description: The domain's system certificate; only system and key
                    are needed
                  value:
                    key: default
                    system: true
              schema:
                $ref: "#/components/schemas/AutomationCertificate"
          description: The certificate
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain or certificate not found, or not managed by the Automation\
            \ API"
      summary: Get a certificate
      tags:
      - Certificates
      - Domains
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities:
    get:
      description: Returns all identity providers managed by the Automation API under
        the domain. Identity providers created outside the Automation API are not
        returned.
      operationId: automationListIdentityProviders
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                AutomationIdentityProviderList:
                  value:
                  - key: corporate-ldap
                    name: Corporate LDAP
                    type: inline-am-idp
                    configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                      :\"...\"}]}"
                    mappers:
                      sub: username
                      email: email
                    roleMapper:
                      role-id:
                      - username=admin
                    groupMapper:
                      group-id:
                      - username=admin
                    domainWhitelist:
                    - example.com
                  - key: default
                    system: true
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationIdentityProvider"
          description: List of identity providers
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain not found, or not managed by the Automation API"
      summary: List a domain's identity providers
      tags:
      - Identity Providers
      - Domains
    put:
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the identity provider within the domain. On first apply the identity
        provider is created; subsequent applies update it. The system flag is immutable;
        changing it requires deleting and recreating the identity provider.
      operationId: automationCreateOrUpdateIdentityProvider
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            examples:
              Identity provider:
                description: A fully specified identity provider
                value:
                  key: corporate-ldap
                  name: Corporate LDAP
                  type: inline-am-idp
                  configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                    :\"...\"}]}"
                  mappers:
                    sub: username
                    email: email
                  roleMapper:
                    role-id:
                    - username=admin
                  groupMapper:
                    group-id:
                    - username=admin
                  domainWhitelist:
                  - example.com
              System identity provider:
                description: The domain's system identity provider; only system and
                  key are needed
                value:
                  key: default
                  system: true
            schema:
              $ref: "#/components/schemas/AutomationIdentityProvider"
        description: "Desired state of the identity provider. For a system identity\
          \ provider, supply only system: true and key."
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Identity provider:
                  description: A fully specified identity provider
                  value:
                    key: corporate-ldap
                    name: Corporate LDAP
                    type: inline-am-idp
                    configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                      :\"...\"}]}"
                    mappers:
                      sub: username
                      email: email
                    roleMapper:
                      role-id:
                      - username=admin
                    groupMapper:
                      group-id:
                      - username=admin
                    domainWhitelist:
                    - example.com
                System identity provider:
                  description: The domain's system identity provider; only system
                    and key are needed
                  value:
                    key: default
                    system: true
              schema:
                $ref: "#/components/schemas/AutomationIdentityProvider"
          description: The created or updated identity provider
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 400
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Invalid request: a key conflict, a missing required field\
            \ (name or type) for a non-system identity provider, an attempt to change\
            \ the immutable system flag, or a second system identity provider for\
            \ the domain"
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: Permission denied
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 404
                    message: A human-readable description of the error
              schema:
                $ref: "#/components/schemas/Error"
          description: "Domain not found, or not managed by the Automation API"
      summary: Create or update an identity provider
      tags:
      - Identity Providers
      - Domains
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities/{identityKey}:
    delete:
      description: Deletes an Automation-managed identity provider by its key. Deleting
        an identity provider that does not exist also returns 204.
      operationId: automationDeleteIdentityProvider
      parameters:
      - description: Identifier of the organization that owns the environment.
        example: DEFAULT
        in: path
        name: orgId
        required: true
        schema:
          type: string
      - description: Identifier of the environment the domain belongs to.
        example: DEFAULT
        in: path
        name: envId
        required: true
        schema:
          type: string
      - description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        example: example-domain
        in: path
        name: domainKey
        required: true
        schema:
          type: string
      - description: Key of the identity within the domain.
        example: corporate-ldap
        in: path
        name: identityKey
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Identity provider successfully deleted
        "403":
          content:
            application/json:
              examples:
                error:
                  value:
                    http_status: 403
                    message: A human-readable description of the error
              schema:
