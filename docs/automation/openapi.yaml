                    audit\"}"
              System reporter:
                description: The domain's system reporter; only system and key are
                  needed
                value:
                  key: default
                  system: true
            schema:
              $ref: "#/components/schemas/AutomationReporter"
        description: "Desired state of the reporter. For a system reporter, supply\
          \ only system: true and key."
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Reporter:
                  description: A fully specified reporter
                  value:
                    key: audit-kafka
                    name: Audit events to Kafka
                    type: reporter-am-kafka
                    enabled: true
                    configuration: "{\"bootstrapServers\":\"kafka:9092\",\"topic\"\
                      :\"audit\"}"
                System reporter:
