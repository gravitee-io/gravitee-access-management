openapi: 3.0.1
info:
  title: Gravitee.io - Access Management API
  version: 4.12.0-SNAPSHOT
servers:
- url: /management
security:
- BearerAuth: []
- BasicAuth: []
tags:
- name: Domains
- name: Environments
- name: Identity Providers
paths:
  /organizations/{orgId}/environments:
    get:
      tags:
      - Environments
      summary: List all environments
      description: Returns all environments within the specified organization.
      operationId: listEnvironments
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
    put:
      tags:
      - Environments
      summary: Create or update an environment
      description: Idempotent create-or-update. Uses the hrid field in the body to
        identify the environment.
      operationId: createOrUpdateEnvironment
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationEnvironmentDefinition"
        required: true
      responses:
        "200":
          description: The created or updated environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
  /organizations/{orgId}/environments/{envId}:
    get:
      tags:
      - Environments
      summary: Get an environment
      operationId: getEnvironment_1
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    delete:
      tags:
      - Environments
      summary: Delete an environment
      operationId: deleteEnvironment_1
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Environment deleted
  /organizations/{orgId}/environments/{envId}/domains:
    get:
      tags:
      - Domains
      - Environments
      summary: List all domains
      description: Returns all security domains within the specified environment.
      operationId: listDomains_2
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"
    put:
      tags:
      - Domains
      - Environments
      summary: Create or update a domain
      description: Idempotent create-or-update. Uses the hrid field in the body to
        identify the domain.
      operationId: createOrUpdateDomain_2
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationDomainDefinition"
        required: true
      responses:
        "200":
          description: The created or updated domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
  /organizations/{orgId}/environments/{envId}/domains/{domainHrid}:
    get:
      tags:
      - Domains
      - Environments
      summary: Get a domain
      description: Retrieves a single security domain by its HRID.
      operationId: getDomain_3
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
    delete:
      tags:
      - Domains
      - Environments
      summary: Delete a domain
      operationId: deleteDomain_3
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Domain deleted
  /organizations/{orgId}/environments/{envId}/domains/{domainHrid}/identity-providers:
    get:
      tags:
      - Identity Providers
      - Domains
      - Environments
      summary: List all identity providers
      description: Returns all identity providers within the specified domain.
      operationId: listIdentityProviders_4
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of identity providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityProvider"
    put:
      tags:
      - Identity Providers
      - Domains
      - Environments
      summary: Create or update an identity provider
      description: Idempotent create-or-update. Uses the hrid field in the body to
        identify the identity provider.
      operationId: createOrUpdateIdentityProvider_4
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationIdentityProviderDefinition"
        required: true
      responses:
        "200":
          description: The created or updated identity provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
  /organizations/{orgId}/environments/{envId}/domains/{domainHrid}/identity-providers/{idpId}:
    get:
      tags:
      - Identity Providers
      - Domains
      - Environments
      summary: Get an identity provider
      operationId: getIdentityProvider_5
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      - name: idpId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The identity provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
    delete:
      tags:
      - Identity Providers
      - Domains
      - Environments
      summary: Delete an identity provider
      operationId: deleteIdentityProvider_5
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: envId
        in: path
        required: true
        schema:
          type: string
      - name: domainHrid
        in: path
        required: true
        schema:
          type: string
      - name: idpId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Identity provider deleted
