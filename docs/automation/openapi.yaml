openapi: 3.0.1
info:
  title: Gravitee.io AM - Automation API
  description: |-
    Declarative, idempotent management of Gravitee Access Management resources.

    Each resource is identified by a stable, immutable `key` that you choose. Applying a resource with `PUT` creates it on first use and updates it on subsequent applies, so the same request can be replayed safely to converge on a desired state.

    The API only sees and manages resources it owns (those marked as managed by the Automation API). Resources created through the Management API or console are invisible to these endpoints and cannot be read, updated, or deleted here; conversely, resources created here are fully owned by the Automation API.

    Domains are the top-level resource; certificates, identity providers, and reporters are managed as sub-resources of a domain. Deleting a domain cascades to its Automation-managed sub-resources. Some sub-resources support a `system` flag identifying the domain's built-in default; the flag is immutable once set.

    This API complements the Management API, which remains the interactive, full-featured management surface.
  contact:
    name: DevX team
    url: https://www.gravitee.io/
    email: team-gko@graviteesource.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 4.12.0-alpha.5
servers:
- url: http://localhost:8093/management/automation
security:
- BearerAuth: []
tags:
- name: Certificates
  description: Certificates configured under a domain to sign and verify tokens.
- name: Domains
  description: "Security domains: the top-level container for an authentication and\
    \ authorization configuration. Create, read, update, and delete domains, and reach\
    \ their sub-resources."
- name: Identity Providers
  description: Identity providers configured under a domain to authenticate users.
- name: Reporters
  description: Reporters configured under a domain to persist audit events to a backend.
paths:
  /organizations/{orgId}/environments/{envId}/domains:
    get:
      tags:
      - Domains
      summary: List all domains
      description: Returns all security domains within the specified environment.
      operationId: automationListDomains
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      responses:
        "200":
          description: List of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationDomain"
              examples:
                AutomationDomainList:
                  value:
                  - key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 500
    put:
      tags:
      - Domains
      summary: Create or update a domain
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the domain. On first apply the domain is created; subsequent applies
        update it. dataPlaneId is required at creation and immutable afterwards.
      operationId: automationCreateOrUpdateDomain
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      requestBody:
        description: Desired state of the domain.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationDomain"
            examples:
              Domain:
                description: A domain with common settings
                value:
                  key: example-domain
                  name: Example domain
                  description: An example authentication domain
                  enabled: true
                  path: /example-domain
                  dataPlaneId: default
                  tags:
                  - eu
                  - production
                  accountSettings:
                    inherited: false
                    loginAttemptsDetectionEnabled: true
                    maxLoginAttempts: 10
                    accountBlockedDuration: 7200
                  oidc:
                    redirectUriStrictMatching: true
        required: true
      responses:
        "200":
          description: The created or updated domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDomain"
              examples:
                Domain:
                  description: A domain with common settings
                  value:
                    key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
        "400":
          description: "Invalid request: validation failure, an immutable field change,\
            \ a key that already exists for a domain not managed by the Automation\
            \ API, or an unknown defaultIdentityProviderForRegistration reference"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 400
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}:
    get:
      tags:
      - Domains
      summary: Get a domain
      description: Retrieves a single Automation-managed security domain by its key.
      operationId: automationGetDomain
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      responses:
        "200":
          description: The domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDomain"
              examples:
                Domain:
                  description: A domain with common settings
                  value:
                    key: example-domain
                    name: Example domain
                    description: An example authentication domain
                    enabled: true
                    path: /example-domain
                    dataPlaneId: default
                    tags:
                    - eu
                    - production
                    accountSettings:
                      inherited: false
                      loginAttemptsDetectionEnabled: true
                      maxLoginAttempts: 10
                      accountBlockedDuration: 7200
                    oidc:
                      redirectUriStrictMatching: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
    delete:
      tags:
      - Domains
      summary: Delete a domain
      description: "Deletes an Automation-managed domain. Deletion cascades to the\
        \ domain's sub-resources (certificates, identity providers, and reporters).\
        \ Deleting a domain that does not exist also returns 204."
      operationId: automationDeleteDomain
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      responses:
        "204":
          description: Domain successfully deleted
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 500
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates:
    get:
      tags:
      - Certificates
      - Domains
      summary: List a domain's certificates
      description: Returns all certificates managed by the Automation API under the
        domain. Certificates created outside the Automation API are not returned.
      operationId: automationListCertificates
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      responses:
        "200":
          description: List of certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationCertificate"
              examples:
                AutomationCertificateList:
                  value:
                  - key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                  - key: default
                    system: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
    put:
      tags:
      - Certificates
      - Domains
      summary: Create or update a certificate
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the certificate within the domain. Re-applying an unchanged definition
        is a no-op. The system flag is immutable; changing it requires deleting and
        recreating the certificate.
      operationId: automationCreateOrUpdateCertificate
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      requestBody:
        description: "Desired state of the certificate. For a system certificate,\
          \ supply only system: true and key."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationCertificate"
            examples:
              Certificate:
                description: A fully specified certificate
                value:
                  key: signing-cert
                  name: Signing certificate
                  type: javakeystore-am-certificate
                  configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                    },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                    secret\"}"
              System certificate:
                description: The domain's system certificate; only system and key
                  are needed
                value:
                  key: default
                  system: true
        required: true
      responses:
        "200":
          description: The created or updated certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationCertificate"
              examples:
                Certificate:
                  description: A fully specified certificate
                  value:
                    key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                System certificate:
                  description: The domain's system certificate; only system and key
                    are needed
                  value:
                    key: default
                    system: true
        "400":
          description: "Invalid request: a key conflict, a missing required field\
            \ for a non-system certificate, an attempt to change the immutable system\
            \ flag, or a second system certificate for the domain"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 400
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}:
    get:
      tags:
      - Certificates
      - Domains
      summary: Get a certificate
      description: Retrieves a single Automation-managed certificate by its key.
      operationId: automationGetCertificate
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      - name: certKey
        in: path
        description: Key of the certificate within the domain.
        required: true
        schema:
          type: string
        example: signing-cert
      responses:
        "200":
          description: The certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationCertificate"
              examples:
                Certificate:
                  description: A fully specified certificate
                  value:
                    key: signing-cert
                    name: Signing certificate
                    type: javakeystore-am-certificate
                    configuration: "{\"jks\":{\"content\":\"...\",\"name\":\"keystore.jks\"\
                      },\"storepass\":\"secret\",\"alias\":\"mykey\",\"keypass\":\"\
                      secret\"}"
                System certificate:
                  description: The domain's system certificate; only system and key
                    are needed
                  value:
                    key: default
                    system: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain or certificate not found, or not managed by the Automation\
            \ API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
    delete:
      tags:
      - Certificates
      - Domains
      summary: Delete a certificate
      description: Deletes an Automation-managed certificate by its key. Deleting
        a certificate that does not exist also returns 204.
      operationId: automationDeleteCertificate
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      - name: certKey
        in: path
        description: Key of the certificate within the domain.
        required: true
        schema:
          type: string
        example: signing-cert
      responses:
        "204":
          description: Certificate successfully deleted
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 500
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/identity-providers:
    get:
      tags:
      - Identity Providers
      - Domains
      summary: List a domain's identity providers
      description: Returns all identity providers managed by the Automation API under
        the domain. Identity providers created outside the Automation API are not
        returned.
      operationId: automationListIdentityProviders
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      responses:
        "200":
          description: List of identity providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationIdentityProvider"
              examples:
                AutomationIdentityProviderList:
                  value:
                  - key: corporate-ldap
                    name: Corporate LDAP
                    type: inline-am-idp
                    configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                      :\"...\"}]}"
                    mappers:
                      sub: username
                      email: email
                    roleMapper:
                      role-id:
                      - username=admin
                    groupMapper:
                      group-id:
                      - username=admin
                    domainWhitelist:
                    - example.com
                  - key: default
                    system: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
    put:
      tags:
      - Identity Providers
      - Domains
      summary: Create or update an identity provider
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the identity provider within the domain. On first apply the identity
        provider is created; subsequent applies update it. The system flag is immutable;
        changing it requires deleting and recreating the identity provider.
      operationId: automationCreateOrUpdateIdentityProvider
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      requestBody:
        description: "Desired state of the identity provider. For a system identity\
          \ provider, supply only system: true and key."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationIdentityProvider"
            examples:
              Identity provider:
                description: A fully specified identity provider
                value:
                  key: corporate-ldap
                  name: Corporate LDAP
                  type: inline-am-idp
                  configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                    :\"...\"}]}"
                  mappers:
                    sub: username
                    email: email
                  roleMapper:
                    role-id:
                    - username=admin
                  groupMapper:
                    group-id:
                    - username=admin
                  domainWhitelist:
                  - example.com
              System identity provider:
                description: The domain's system identity provider; only system and
                  key are needed
                value:
                  key: default
                  system: true
        required: true
      responses:
        "200":
          description: The created or updated identity provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationIdentityProvider"
              examples:
                Identity provider:
                  description: A fully specified identity provider
                  value:
                    key: corporate-ldap
                    name: Corporate LDAP
                    type: inline-am-idp
                    configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                      :\"...\"}]}"
                    mappers:
                      sub: username
                      email: email
                    roleMapper:
                      role-id:
                      - username=admin
                    groupMapper:
                      group-id:
                      - username=admin
                    domainWhitelist:
                    - example.com
                System identity provider:
                  description: The domain's system identity provider; only system
                    and key are needed
                  value:
                    key: default
                    system: true
        "400":
          description: "Invalid request: a key conflict, a missing required field\
            \ (name or type) for a non-system identity provider, an attempt to change\
            \ the immutable system flag, or a second system identity provider for\
            \ the domain"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 400
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/identity-providers/{idpKey}:
    get:
      tags:
      - Identity Providers
      - Domains
      summary: Get an identity provider
      description: Retrieves a single Automation-managed identity provider by its
        key.
      operationId: automationGetIdentityProvider
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      - name: idpKey
        in: path
        description: Key of the identity provider within the domain.
        required: true
        schema:
          type: string
        example: corporate-ldap
      responses:
        "200":
          description: The identity provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationIdentityProvider"
              examples:
                Identity provider:
                  description: A fully specified identity provider
                  value:
                    key: corporate-ldap
                    name: Corporate LDAP
                    type: inline-am-idp
                    configuration: "{\"users\":[{\"username\":\"admin\",\"password\"\
                      :\"...\"}]}"
                    mappers:
                      sub: username
                      email: email
                    roleMapper:
                      role-id:
                      - username=admin
                    groupMapper:
                      group-id:
                      - username=admin
                    domainWhitelist:
                    - example.com
                System identity provider:
                  description: The domain's system identity provider; only system
                    and key are needed
                  value:
                    key: default
                    system: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain or identity provider not found, or not managed by the\
