        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      - name: idpKey
        in: path
        description: Key of the identity provider within the domain.
        required: true
        schema:
          type: string
        example: corporate-ldap
      responses:
        "204":
          description: Identity provider successfully deleted
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 500
  /organizations/{orgId}/environments/{envId}/domains/{domainKey}/reporters:
    get:
      tags:
      - Reporters
      - Domains
      summary: List a domain's reporters
      description: Returns all reporters managed by the Automation API under the domain.
        Reporters created outside the Automation API are not returned.
      operationId: automationListReporters
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      responses:
        "200":
          description: List of reporters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationReporter"
              examples:
                AutomationReporterList:
                  value:
                  - key: audit-kafka
                    name: Audit events to Kafka
                    type: reporter-am-kafka
                    enabled: true
                    configuration: "{\"bootstrapServers\":\"kafka:9092\",\"topic\"\
                      :\"audit\"}"
                  - key: default
                    system: true
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
    put:
      tags:
      - Reporters
      - Domains
      summary: Create or update a reporter
      description: Idempotent create-or-update. Uses the key field in the body to
        identify the reporter within the domain. On first apply the reporter is created;
        subsequent applies update it. The system flag is immutable; changing it requires
        deleting and recreating the reporter.
      operationId: automationCreateOrUpdateReporter
      parameters:
      - name: orgId
        in: path
        description: Identifier of the organization that owns the environment.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: envId
        in: path
        description: Identifier of the environment the domain belongs to.
        required: true
        schema:
          type: string
        example: DEFAULT
      - name: domainKey
        in: path
        description: "Key of the domain: its stable, immutable Automation identifier\
          \ within the environment."
        required: true
        schema:
          type: string
        example: example-domain
      requestBody:
        description: "Desired state of the reporter. For a system reporter, supply\
          \ only system: true and key."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationReporter"
            examples:
              Reporter:
                description: A fully specified reporter
                value:
                  key: audit-kafka
                  name: Audit events to Kafka
                  type: reporter-am-kafka
                  enabled: true
                  configuration: "{\"bootstrapServers\":\"kafka:9092\",\"topic\":\"\
                    audit\"}"
              System reporter:
                description: The domain's system reporter; only system and key are
                  needed
                value:
                  key: default
                  system: true
        required: true
      responses:
        "200":
          description: The created or updated reporter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationReporter"
              examples:
                Reporter:
                  description: A fully specified reporter
                  value:
                    key: audit-kafka
                    name: Audit events to Kafka
                    type: reporter-am-kafka
                    enabled: true
                    configuration: "{\"bootstrapServers\":\"kafka:9092\",\"topic\"\
                      :\"audit\"}"
                System reporter:
                  description: The domain's system reporter; only system and key are
                    needed
                  value:
                    key: default
                    system: true
        "400":
          description: "Invalid request: a key conflict, a missing required field\
            \ (name, type, or configuration) for a non-system reporter, an attempt\
            \ to change the immutable system flag, or a second system reporter for\
            \ the domain"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 400
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 403
        "404":
          description: "Domain not found, or not managed by the Automation API"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                error:
                  value:
                    message: A human-readable description of the error
                    http_status: 404
