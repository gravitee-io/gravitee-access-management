#
# Local-stack overlay running SPIRE so AM can be exercised against a real
# SPIFFE workload identity issuer.
#
# Trust domain:        am.local
# Workload entries:    spiffe://am.local/agent/billing
# JWKS for AM:         http://spire-oidc:8443/keys (on compose network)
#                      http://localhost:18443/keys (from host)
#
# Compose:
#   docker compose -f dev/docker-compose.yml -f dev/docker-compose-dev.yml \
#                  -f dev/docker-compose.mongo.yml -f dev/docker-compose.spire.yml up -d
#

services:
  # One-shot init: pre-chowns the spire-server data volume so the server can
  # run as a non-root user (1000:1000) and the bootstrap/agent containers
  # can read the UDS that the server writes into the shared volume.
  spire-perms-init:
    image: alpine:3.19
    command: ["sh", "-c", "mkdir -p /data /shared && chown -R 1000:1000 /data /shared && chmod 0755 /data /shared"]
    volumes:
      - spire-server-data:/data
      - spire-shared:/shared

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    # Run as the same unprivileged uid as the bootstrap/agent containers so
    # they can read the server-created UDS in the shared volume.
    user: "1000:1000"
    command: ["-config", "/run/spire/config/server.conf"]
    depends_on:
      spire-perms-init:
        condition: service_completed_successfully
    volumes:
      - ./spire/server.conf:/run/spire/config/server.conf:ro
      - spire-server-data:/run/spire/data
      - spire-shared:/run/spire/shared
    ports:
      - 18081:8081
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck", "-socketPath", "/run/spire/shared/server.sock"]
      interval: 5s
      timeout: 3s
      retries: 20

  spire-bootstrap:
    build:
      context: ./spire/bootstrap
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - spire-shared:/run/spire/shared

  spire-agent:
    build:
      context: ./spire/agent
    depends_on:
      spire-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./spire/agent.conf:/run/spire/config/agent.conf:ro
      - spire-shared:/run/spire/shared
      - spire-agent-public:/run/spire-agent/public
    healthcheck:
      test: ["CMD", "/usr/local/bin/spire-agent", "healthcheck", "-socketPath", "/run/spire-agent/public/api.sock"]
      interval: 5s
      timeout: 3s
      retries: 20

  spire-oidc:
    image: ghcr.io/spiffe/oidc-discovery-provider:1.9.6
    # Run as the same uid as spire-agent so the unix workload attestor can
    # readlink /proc/<pid>/exe; otherwise SPIRE's path-discovery step is
    # denied for cross-uid processes.
    user: "1000:1000"
    depends_on:
      spire-agent:
        condition: service_healthy
    # Share PID namespace with the agent so the unix workload attestor can
    # resolve the OIDC provider's caller PID across containers.
    pid: "service:spire-agent"
    command: ["-config", "/run/spire/config/oidc-provider.conf"]
    volumes:
      - ./spire/oidc-provider.conf:/run/spire/config/oidc-provider.conf:ro
      - spire-agent-public:/run/spire-agent/public:ro
    ports:
      - 18443:8443
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/keys"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  spire-server-data:
  spire-shared:
  spire-agent-public:
