services:
  kdc:
    build: kerberos
    container_name: gio_am_kdc
    hostname: kdc
    ports:
      - "88:88"
      - "88:88/udp"
      - "749:749"
    volumes:
      - kdc-data:/var/lib/krb5kdc
    healthcheck:
      test: ["CMD", "kadmin.local", "-q", "listprincs"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    depends_on:
      kdc:
        condition: service_healthy
    volumes:
      - kdc-data:/etc/krb5kdc:ro
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - ./plugins/enterprise/gravitee-am-identityprovider-kerberos-${KERBEROS_PLUGIN_VERSION:-3.0.0}.zip:/opt/graviteeio-am-gateway/plugins/gravitee-am-identityprovider-kerberos-${KERBEROS_PLUGIN_VERSION:-3.0.0}.zip:ro
    extra_hosts:
      - "kdc.gravitee.local:host-gateway"

  management:
    volumes:
      - ./plugins/enterprise/gravitee-am-identityprovider-kerberos-${KERBEROS_PLUGIN_VERSION:-3.0.0}.zip:/opt/graviteeio-am-management-api/plugins/gravitee-am-identityprovider-kerberos-${KERBEROS_PLUGIN_VERSION:-3.0.0}.zip:ro

volumes:
  kdc-data:
