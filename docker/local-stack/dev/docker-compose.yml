services:
  gateway:
    build:
      context: build-ctx
      args:
        - GRAVITEEAM_VERSION=${AM_VERSION}
      dockerfile: ../../../gateway/Dockerfile-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:18092/_node/health?probes=http-server,security-domain-sync", "-u", "admin:adminadmin" ]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      management:
        condition: service_healthy
    ports:
      - 8092:8092
      - 18092:18092
    environment:
      - GRAVITEE_EMAIL_ENABLED=true
      - GRAVITEE_EMAIL_HOST=smtp
      - GRAVITEE_EMAIL_PORT=5025
      - GRAVITEE_MFA_RATE_ENABLED=true
      - GRAVITEE_MFA_RATE_LIMIT=2
      - GRAVITEE_MFA_RATE_TIMEPERIOD=1
      - GRAVITEE_MFA_RATE_TIMEUNIT=Minutes
      - GRAVITEE_SERVICES_SYNC_CRON=*/2 * * * * *
      - GRAVITEE_SERVICES_SYNC_TIMEFRAMEBEFOREDELAY=5000
      - GRAVITEE_SERVICES_SYNC_TIMEFRAMEAFTERDELAY=5000
      - GRAVITEE_HTTP_SSL_CERTIFICATEHEADER=X-Client-Cert
      - GRAVITEE_HANDLERS_SCIM_INCLUDEERRORDETAILS=true
      - GIO_MAX_MEM=512m
      - GRAVITEE_SERVICES_CORE_HTTP_HOST=0.0.0.0
      - GRAVITEE_SERVICES_SYNC_PROBES_STATE_ENABLED=true
      - GRAVITEE_HANDLERS_OAUTH2_INTROSPECT_OFFLINEVERIFICATIONTIMERSECONDS=0

  management:
    build:
      context: build-ctx
      args:
        - GRAVITEEAM_VERSION=${AM_VERSION}
      dockerfile: ../../../management-api/Dockerfile-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18093/_node/health?probes=jetty-http-server", "-u", "admin:adminadmin"]
      interval: 5s
      timeout: 2s
      retries: 10
    ports:
      - 8093:8093
      - 18093:18093
    environment:
      - GRAVITEE_EMAIL_ENABLED=true
      - GRAVITEE_EMAIL_HOST=smtp
      - GRAVITEE_EMAIL_PORT=5025
      - GRAVITEE_MFA_RATE_ENABLED=true
      - GRAVITEE_MFA_RATE_LIMIT=2
      - GRAVITEE_MFA_RATE_TIMEPERIOD=1
      - GRAVITEE_MFA_RATE_TIMEUNIT=Minutes
      - GIO_MAX_MEM=512m
      - GRAVITEE_SERVICES_CORE_HTTP_HOST=0.0.0.0
      - GRAVITEE_HTTP_API_AUTOMATION_ENABLED=true

  am-wait:
    image: curlimages/curl:8.10.1
    depends_on:
      management:
        condition: service_healthy
      gateway:
        condition: service_healthy

  smtp:
    image: gessnerfl/fake-smtp-server:1.10.4
    ports:
      - 5080:5080
      - 5025:5025

  wiremock:
    image: wiremock/wiremock:3.13.2
    command: ["--verbose", "--global-response-templating"]
    volumes:
      - ./wiremock/cimd-private-key-jwt-jwks.json:/home/wiremock/__files/cimd-private-key-jwt-jwks.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 5s
      timeout: 2s
      retries: 10
    ports:
      - 8181:8080

  wiremock-init:
    image: curlimages/curl:8.10.1
    depends_on:
      wiremock:
        condition: service_healthy
    volumes:
      - ./wiremock/request-sfr.json:/tmp/request-sfr.json
      - ./wiremock/request-cimd.json:/tmp/request-cimd.json
      - ./wiremock/request-jwks.json:/tmp/request-jwks.json
      - ./wiremock/request-kafka-oauth.json:/tmp/request-kafka-oauth.json
    command:
      - sh
      - -ec
      - |
        curl -fsS -X POST http://wiremock:8080/__admin/mappings/import \
          -d @/tmp/request-sfr.json \
          -H "Content-Type: application/json"
        curl -fsS -X POST http://wiremock:8080/__admin/mappings/import \
          -d @/tmp/request-cimd.json \
          -H "Content-Type: application/json"
        curl -fsS -X POST http://wiremock:8080/__admin/mappings/import \
          -d @/tmp/request-jwks.json \
          -H "Content-Type: application/json"
        curl -fsS -X POST http://wiremock:8080/__admin/mappings/import \
          -d @/tmp/request-kafka-oauth.json \
          -H "Content-Type: application/json"

  ciba:
    image: gravitee-am-ciba-delegated-service
    ports:
      - 8080:8080

  openfga:
    image: openfga/openfga:v1.8.5
    ports:
      - 8090:8080
      - 8091:8081
    command: ["run", "--playground-enabled=false"]

  kafka:
    image: apache/kafka:3.8.0
    depends_on:
      wiremock-init:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
      - "127.0.0.1:9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,OAUTH://0.0.0.0:29094,OAUTHHOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092,OAUTH://kafka:29094,OAUTHHOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,OAUTH:SASL_PLAINTEXT,OAUTHHOST:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_LISTENER_NAME_OAUTH_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_LISTENER_NAME_OAUTHHOST_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_LISTENER_NAME_OAUTH_OAUTHBEARER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_OAUTHHOST_OAUTHBEARER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_OAUTH_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_OAUTHHOST_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerValidatorCallbackHandler
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://wiremock:8080/kafka/oauth/jwks
      KAFKA_SASL_OAUTHBEARER_EXPECTED_ISSUER: gravitee-kafka-oauth
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: gravitee-kafka
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway-mtls:
    image: nginx:1.21.1-alpine
    restart: always
    volumes:
      - ./gateway-mtls/nginx.conf:/etc/nginx/nginx.conf
      - ./gateway-mtls/server/server.crt:/etc/nginx/certs/server.crt:ro
      - ./gateway-mtls/server/server.key:/etc/nginx/certs/server.key:ro
      - ./gateway-mtls/server/ca.crt:/etc/nginx/certs/ca.crt:ro
    ports:
      - 1443:1443
