databaseChangeLog:
  - changeSet:
      id: 4.12.0-add-managed-by-to-domains
      author: GraviteeSource Team
      preConditions:
        onFail: MARK_RAN
        not:
          - columnExists:
              tableName: domains
              columnName: managed_by
      changes:
        - addColumn:
            tableName: domains
            columns:
              - column:
                  name: managed_by
                  type: varchar(64)
                  constraints:
                    nullable: true
  - changeSet:
      id: 4.12.0-add-managed-by-to-identities
      author: GraviteeSource Team
      preConditions:
        onFail: MARK_RAN
        not:
          - columnExists:
              tableName: identities
              columnName: managed_by
      changes:
        - addColumn:
            tableName: identities
            columns:
              - column:
                  name: managed_by
                  type: varchar(64)
                  constraints:
                    nullable: true
