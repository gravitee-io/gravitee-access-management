<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Bootstrap</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{assets/css/main.css}">

    <!-- Favicon and touch icons -->
    <link rel="shortcut icon" th:href="${theme.faviconUrl} ?: @{assets/ico/favicon.ico}">

    <!-- Custom CSS -->
    <style th:if="${theme.css}" th:text="${theme.css}"></style>
    <style th:if="${theme.customCss}" th:text="${theme.customCss}"></style>
</head>

<body>

<div class="container">
    <div class="header">
        <img class="logo" th:src="${theme.logoUrl} ?: @{assets/images/gravitee-logo.svg}">
        <div class="title">
            <span>Agent Bootstrap Request</span>
        </div>
        <div class="header-description">
            <img th:if="${agentServerLogoUri != null}" th:src="${agentServerLogoUri}" alt="" style="max-height: 48px; max-width: 48px; vertical-align: middle; margin-right: 8px;">
            <span class="deep-blue" th:text="${agentServerName}"></span>
            <span> wants to create an agent identity for you</span>
        </div>
    </div>
    <div class="section">
        <form class="form" role="form" th:action="${action}" method="post">
            <div class="box center">
                <div>
                    <span>This will allow the agent server to act on your behalf using the AAUTH protocol.</span>
                </div>
                <div style="margin-top: 10px;">
                    <span class="grey">No data will be shared at this step. The agent will request specific permissions separately.</span>
                </div>
            </div>

            <input type="hidden" name="code" th:value="${interactionCode}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <button type="submit" name="user_oauth_approval" value="true" class="button primary">Approve</button>
            </div>
            <div>
                <button type="submit" name="user_oauth_approval" value="false" class="button secondary">Deny</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
