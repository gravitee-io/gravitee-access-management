<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Authorization</title>

    <!-- Auto-refresh when waiting for agent clarification response -->
    <meta th:if="${awaitingClarification}" http-equiv="refresh" content="5">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{assets/css/main.css}">

    <!-- Favicon and touch icons -->
    <link rel="shortcut icon" th:href="${theme.faviconUrl} ?: @{assets/ico/favicon.ico}">

    <!-- Custom CSS -->
    <style th:if="${theme.css}" th:text="${theme.css}"></style>
    <style th:if="${theme.customCss}" th:text="${theme.customCss}"></style>
</head>

<body>

<div class="container">
    <div class="header">
        <img class="logo" th:src="${theme.logoUrl} ?: @{assets/images/gravitee-logo.svg}">
        <div class="title">
            <span>Agent Authorization Request</span>
        </div>
        <div class="header-description">
            <img th:if="${agentLogoUri != null}" th:src="${agentLogoUri}" alt="" style="max-height: 48px; max-width: 48px; vertical-align: middle; margin-right: 8px;">
            <span class="deep-blue" th:text="${agentName}"></span>
            <span> is requesting access on your behalf</span>
        </div>
    </div>
    <div class="section">
        <form class="form" role="form" th:action="${action}" method="post">
            <div class="box center" th:each="scope : ${scopes}">
                <div>
                    <span th:text="(${scope.name})
                    ? ${scope.name} + ' (' + ${scope.key} + ')'
                    : ${scope.key}"></span>
                </div>
                <div th:if="${scope.description}">
                    <span class="grey" th:text="${scope.description}"></span>
                </div>
                <input type="hidden" th:name="'scope.'+${scope.key}" value="true"/>
            </div>

            <div th:if="${justification != null and !justification.isEmpty()}" style="margin-top: 10px; margin-bottom: 10px;">
                <div class="header-description start">
                    <strong>Reason: </strong>
                    <div th:utext="${justification}"></div>
                </div>
            </div>

            <!-- Agent's clarification response -->
            <div th:if="${clarificationResponse != null and !clarificationResponse.isEmpty()}" style="margin-top: 10px; margin-bottom: 10px; padding: 10px; background-color: #f5f5f5; border-left: 3px solid #4CAF50;">
                <strong th:text="${agentName} + ' responded:'"></strong>
                <div th:utext="${clarificationResponse}" style="margin-top: 5px;"></div>
            </div>

            <!-- Waiting for agent response -->
            <div th:if="${awaitingClarification}" style="margin-top: 10px; margin-bottom: 10px; padding: 10px; background-color: #fff3e0; border-left: 3px solid #FF9800;">
                <strong>Waiting for agent response...</strong>
                <p class="grey">Your question has been sent to the agent. This page will refresh automatically.</p>
            </div>

            <input type="hidden" name="code" th:value="${interactionCode}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Clarification question form (only when supported, under max rounds, and not already waiting) -->
            <!-- Approve / Deny buttons (always visible unless waiting) -->
            <div th:unless="${awaitingClarification}">
                <div>
                    <button type="submit" name="user_oauth_approval" value="true" class="button primary">Approve</button>
                </div>
                <div>
                    <button type="submit" name="user_oauth_approval" value="false" class="button secondary">Deny</button>
                </div>
            </div>

            <!-- Clarification question form (below approve/deny, only when supported) -->
            <div th:if="${clarificationSupported and !awaitingClarification and clarificationRoundCount < maxClarificationRounds}"
                 class="box" style="margin-top: 15px; text-align: left;">
                <label class="grey" style="display: block; margin-bottom: 5px;">Have a question for the agent?</label>
                <textarea name="clarification_question" class="input-field" placeholder="e.g. Why do you need write access?"
                          rows="2" style="height: auto; resize: vertical;"></textarea>
                <div style="margin-top: 8px;">
                    <button type="submit" name="action" value="clarify" class="button secondary">Ask Question</button>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
