<h2 mat-dialog-title>Create Custom Form</h2>
<mat-dialog-content>
  <form [formGroup]="formGroup">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Form Name</mat-label>
      <input matInput formControlName="template" placeholder="My Custom Form" />
      <mat-error *ngIf="formGroup.get('template').hasError('required')"> Form name is required </mat-error>
      <mat-error *ngIf="formGroup.get('template').hasError('minlength')"> Form name must be at least 3 characters </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Content (HTML)</mat-label>
      <textarea matInput formControlName="content" placeholder="Enter your form HTML content" rows="10"></textarea>
      <mat-error *ngIf="formGroup.get('content').hasError('required')"> Form content is required </mat-error>
    </mat-form-field>

    <mat-checkbox formControlName="enabled" class="full-width"> Enable this form </mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="isSubmitting || formGroup.invalid">Create</button>
</mat-dialog-actions>
