<mat-form-field appearance="outline" floatLabel="always">
  <mat-label>Template Application</mat-label>
  <mat-select
    [(ngModel)]="selectedValue"
    (ngModelChange)="onSelectChange($event)"
    [disabled]="disabled"
    [required]="required"
    placeholder="Select a template application ..."
  >
    <mat-option [value]="null">— None —</mat-option>
    <mat-option *ngFor="let app of templateApps" [value]="app.id">{{ app.name }}</mat-option>
    <mat-option *ngIf="templateApps.length === 0" disabled
      >No template applications found — mark an application as a template in its Settings &gt; General page.</mat-option
    >
  </mat-select>
  <mat-hint>The template application used in CIMD requests.</mat-hint>
  <mat-error>Template Application is required.</mat-error>
</mat-form-field>
