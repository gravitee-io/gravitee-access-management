<h2 mat-dialog-title>Metadata document</h2>
<mat-dialog-content class="cimd-metadata-dialog-content">
  <p *ngIf="data?.url" class="cimd-metadata-dialog-source">
    <span class="cimd-metadata-dialog-label">Source:</span>
    <a [href]="data.url" target="_blank" rel="noopener noreferrer">{{ data.url }}</a>
  </p>
  <pre class="cimd-metadata-dialog-pre"><code>{{ data?.json }}</code></pre>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="copy()">{{ copied ? 'Copied!' : 'Copy JSON' }}</button>
  <button mat-raised-button color="primary" mat-dialog-close>Close</button>
</mat-dialog-actions>
