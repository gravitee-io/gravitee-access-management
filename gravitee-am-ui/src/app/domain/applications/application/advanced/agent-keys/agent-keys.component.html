<div class="gv-form-section">
  <div class="gv-form-section-title">
    <div fxLayout="row" fxLayoutAlign="space-between center">
      <div fxFlex="70">
        <h5>Agent Keys</h5>
        <small>
          Public keys (JWKS) trusted for authenticating agent instances of this blueprint application. Keys here are used to verify
          <code>workload-jwt</code> client assertions.
        </small>
      </div>
      <button mat-raised-button color="primary" *ngIf="editMode" (click)="openAddDialog()"><mat-icon>add</mat-icon> Add key</button>
    </div>
  </div>

  <div *ngIf="keys.length === 0" class="agent-keys-empty">
    <p>No agent keys registered yet.</p>
  </div>

  <table mat-table [dataSource]="keys" *ngIf="keys.length > 0" class="agent-keys-table">
    <ng-container matColumnDef="kid">
      <th mat-header-cell *matHeaderCellDef>Key ID</th>
      <td mat-cell *matCellDef="let k">
        <code>{{ k.kid }}</code>
      </td>
    </ng-container>
    <ng-container matColumnDef="kty">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let k">{{ k.kty || '-' }}</td>
    </ng-container>
    <ng-container matColumnDef="alg">
      <th mat-header-cell *matHeaderCellDef>Algorithm</th>
      <td mat-cell *matCellDef="let k">{{ k.alg || '-' }}</td>
    </ng-container>
    <ng-container matColumnDef="use">
      <th mat-header-cell *matHeaderCellDef>Use</th>
      <td mat-cell *matCellDef="let k">{{ k.use || '-' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let k">
        <button mat-icon-button *ngIf="editMode" (click)="remove(k.kid)" aria-label="Remove">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
