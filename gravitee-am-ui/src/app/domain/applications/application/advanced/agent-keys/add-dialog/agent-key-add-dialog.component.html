<h2 mat-dialog-title>Add agent key</h2>
<mat-dialog-content>
  <p>
    Paste a JSON Web Key (JWK) below. The key must include a <code>kid</code>. This key will be used to verify agent instance
    <code>jwt-bearer</code> client assertions (RFC 7523).
  </p>
  <mat-form-field appearance="outline" style="width: 100%">
    <mat-label>JWK JSON</mat-label>
    <textarea
      matInput
      cdkTextareaAutosize
      cdkAutosizeMinRows="8"
      cdkAutosizeMaxRows="20"
      [(ngModel)]="jwkText"
      placeholder='{ "kty": "RSA", "kid": "my-key-1", "alg": "RS256", "use": "sig", "n": "...", "e": "AQAB" }'
    >
    </textarea>
  </mat-form-field>
  <div *ngIf="errorMessage" class="agent-key-error">{{ errorMessage }}</div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="!jwkText">Add</button>
</mat-dialog-actions>
