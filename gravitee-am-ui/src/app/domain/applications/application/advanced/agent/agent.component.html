<div class="gv-form-section">
  <div class="gv-form-section-title">
    <h5>Agent Identity Settings</h5>
    <small>
      Blueprint agent configuration. Agent type is set at creation time and cannot be changed. Grant types, token TTLs, scopes, client
      authentication method and JWKS live on the standard <strong>Settings &rarr; OAuth2 / OIDC</strong> tabs for this application.
    </small>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Agent type</mat-label>
    <input matInput [value]="agentTypeLabel" readonly />
    <mat-hint>Immutable after creation</mat-hint>
  </mat-form-field>
</div>
