<form>
  <h2 mat-dialog-title>Renew Client Secret</h2>
  <mat-dialog-content>
    <div class="warning-box">
      <mat-icon class="warning-icon" svgIcon="gio:chat-bubble-warning"></mat-icon>
      <span>Renewing your secret will make existing secret invalid</span>
    </div>
    <p class="confirmation-text">
      Are you sure you want to renew the client secret?
    </p>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close="cancel">Cancel</button>
    <button mat-raised-button mat-dialog-close="renew" color="primary">Renew</button>
  </mat-dialog-actions>
</form>
